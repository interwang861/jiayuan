<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>家园守卫战2 · 复刻</title>
<style>
  :root{ --bg:#0e1410; --panel:#1a2417; --panel-2:#22301d; --line:#33472a; --ink:#eaf2e4;
    --muted:#9bb089; --gold:#f5c542; --hp:#e8574a; --arrow:#d9c9a8; --magic:#8b5cf6;
    --cannon:#c87c4a; --barracks:#6aa0d8; --ok:#7ad07f; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%; background:var(--bg); color:var(--ink);
    font-family:"PingFang SC","Microsoft YaHei",system-ui,-apple-system,Segoe UI,Roboto,sans-serif; overscroll-behavior:none;}
  #app{display:flex; flex-direction:column; height:100%;}
  #hud{display:flex; align-items:center; gap:11px; padding:8px 13px;
    background:linear-gradient(180deg,#243019,#171f10); border-bottom:2px solid #3a5226; flex-wrap:wrap; user-select:none;}
  #title{font-weight:800; letter-spacing:2px; font-size:14px;} #title small{color:var(--muted); font-weight:400; font-size:10.5px; margin-left:3px;}
  .stat{display:flex; align-items:center; gap:5px; font-variant-numeric:tabular-nums;
    background:rgba(0,0,0,.22); padding:4px 9px; border-radius:9px; border:1px solid #2c3d22;}
  .stat b{font-size:16px;} .stat .lbl{font-size:10.5px; color:var(--muted);}
  .spacer{flex:1}
  .ctrl{background:var(--panel-2); color:var(--ink); border:1px solid var(--line); border-radius:8px; padding:6px 11px; font-size:13px; cursor:pointer; transition:.12s;}
  .ctrl:hover{border-color:var(--ok);} .ctrl.go{background:var(--ok); border-color:var(--ok); color:#08210b; font-weight:700;}
  .ctrl.go:disabled{background:#3a4150; border-color:#3a4150; color:#778; cursor:not-allowed;}
  .speedbtns{display:flex; gap:4px;} .speedbtns button{background:var(--panel-2); color:var(--ink); border:1px solid var(--line); border-radius:8px; padding:6px 9px; font-size:13px; cursor:pointer;}
  .speedbtns button.on{background:var(--arrow); border-color:var(--arrow); color:#1a1404; font-weight:700;}
  #stage{flex:1; position:relative; display:flex; align-items:center; justify-content:center; background:radial-gradient(120% 100% at 50% 0%, #1c2a16 0%, #0b110a 80%); overflow:hidden;}
  #wrap{position:relative;} canvas{display:block; border-radius:10px; box-shadow:0 14px 40px rgba(0,0,0,.55); touch-action:none;}
  #popup{position:absolute; display:none; z-index:30; transform:translate(-50%,-50%);}
  #popup-backdrop{position:absolute; inset:0; z-index:28; display:none; background:rgba(6,10,6,.72); backdrop-filter:blur(2px);}
  #popup-backdrop.show{display:block;}
  #popup.mobile-center{position:fixed; left:50% !important; top:50% !important; transform:translate(-50%,-50%); z-index:30; width:min(92vw,300px); max-width:92vw;}
  #popup.mobile-center .manage{min-width:0; width:100%; padding:14px;}
  #popup.mobile-center .manage .acts{flex-direction:column; gap:0; margin-top:12px;}
  #popup.mobile-center .manage .acts .up{padding:14px 8px; font-size:14px; min-height:48px;}
  #popup.mobile-center .manage .acts .sell{margin-top:14px; padding:10px 8px; font-size:11.5px; background:transparent; color:#c99088; border:1px solid #4a3535;}
  #popup.mobile-center .ring{flex-wrap:wrap; justify-content:center; gap:10px; padding:12px;}
  #popup.mobile-center .tbtn{width:72px; padding:8px 4px;}
  .ring{display:flex; gap:6px; background:rgba(16,22,12,.96); border:1px solid var(--line); border-radius:13px; padding:8px; box-shadow:0 10px 30px rgba(0,0,0,.6);}
  .tbtn{width:60px; border:1px solid #2c3d22; border-radius:10px; background:var(--panel-2); cursor:pointer; padding:5px 3px; text-align:center; transition:.12s;}
  .tbtn:hover{border-color:var(--gold); transform:translateY(-2px);} .tbtn.cant{opacity:.4; cursor:not-allowed;}
  .tbtn .ic{height:30px; display:flex; align-items:flex-end; justify-content:center;} .tbtn .ic img{height:30px;}
  .tbtn .nm{font-size:10.5px; margin-top:2px;} .tbtn .pr{font-size:10.5px; color:var(--gold); font-weight:600;}
  .manage{min-width:172px; background:rgba(16,22,12,.97); border:1px solid var(--line); border-radius:12px; padding:11px; box-shadow:0 10px 30px rgba(0,0,0,.6);}
  .manage h4{margin:0 0 6px; font-size:13.5px; display:flex; align-items:center; gap:6px;}
  .manage .row{display:flex; justify-content:space-between; font-size:11.5px; color:var(--muted); margin:3px 0;} .manage .row b{color:var(--ink);}
  .bar{height:7px; background:#0c1208; border:1px solid #2c3d22; border-radius:4px; overflow:hidden; margin:7px 0 3px;}
  .bar i{display:block; height:100%; background:linear-gradient(90deg,#f5c542,#e8a93a);}
  .manage .acts{display:flex; gap:6px; margin-top:9px;} .manage button{flex:1; border:none; border-radius:8px; padding:7px 5px; font-size:12px; cursor:pointer; font-weight:600;}
  .manage .up{background:var(--gold); color:#1a1404;} .manage .up:disabled{background:#3a4150; color:#778; cursor:not-allowed;}
  .manage .evo{background:#8b5cf6; color:#fff;} .manage .sell{background:#3a2a2a; color:#e8a59a;}
  .evopick{display:flex; gap:7px; margin-top:8px;} .evopick .opt{flex:1; border:1px solid #4a3a6a; border-radius:9px; background:#241a38; cursor:pointer; padding:6px; text-align:center;}
  .evopick .opt:hover{border-color:#b89cff;} .evopick .opt img{height:34px;} .evopick .opt .nm{font-size:10.5px; margin-top:2px;}
  .overlay{position:absolute; inset:0; z-index:50; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; background:rgba(6,10,6,.86); backdrop-filter:blur(3px); text-align:center; padding:22px;}
  .overlay h1{margin:0; font-size:28px; letter-spacing:5px; font-weight:800;} .overlay h1 .sub{display:block; font-size:12.5px; letter-spacing:4px; color:var(--gold); margin-top:8px; font-weight:500;}
  .overlay p{margin:0; color:var(--muted); font-size:13px; line-height:1.85; max-width:450px;}
  .overlay .big{background:var(--gold); color:#1a1404; border:none; border-radius:12px; padding:12px 32px; font-size:16px; font-weight:700; cursor:pointer; letter-spacing:2px;}
  .overlay .sl{font-size:14px;} .overlay .sl b{color:var(--gold); font-size:22px;}
  .hide{display:none !important;}
  .hint{position:absolute; left:50%; top:12px; transform:translateX(-50%); z-index:20; background:rgba(16,22,12,.92); border:1px solid var(--line); border-radius:20px; padding:6px 16px; font-size:12.5px; color:var(--gold); pointer-events:none; transition:opacity .3s; white-space:nowrap;}
  /* 宝石面板 */
  #gempanel{position:absolute; right:10px; top:54px; z-index:40; display:none; width:172px;
    background:rgba(16,22,12,.97); border:1px solid var(--line); border-radius:12px; padding:11px; box-shadow:0 10px 30px rgba(0,0,0,.6);}
  #gempanel h4{margin:0 0 8px; font-size:13px;} #gempanel .grow{display:flex; align-items:center; justify-content:space-between; font-size:12.5px; margin:5px 0;}
  #gempanel .gname{display:flex; align-items:center; gap:7px;} #gempanel .sw{width:15px; height:15px; border-radius:4px; border:1px solid rgba(255,255,255,.2);}
  #gempanel .note{font-size:10.5px; color:var(--muted); margin-top:7px; line-height:1.5;}
</style>
</head>
<body>
<div id="app">
  <div id="hud">
    <span id="title">家园守卫战2 <small>复刻 · 矿洞防线</small></span>
    <div class="stat" title="金币：建造/升级货币">
      <svg width="16" height="16" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="#f5c542" stroke="#a9842a" stroke-width="2"/></svg>
      <b id="s-gold">0</b><span class="lbl">金币</span></div>
    <div class="stat" title="基地生命"><svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 21s-7-4.6-9.2-9.3C1.3 8.4 3 5 6.2 5c1.9 0 3.2 1 3.8 2.2C10.6 6 11.9 5 13.8 5 17 5 18.7 8.4 21.2 11.7 19 16.4 12 21 12 21z" fill="#e8574a"/></svg><b id="s-hp">20</b><span class="lbl">基地</span></div>
    <div class="stat" title="可出战波数 / 上限30，每10分钟+1"><b id="s-bank">0</b><span class="lbl" id="bank-lbl">/30 波</span></div>
    <div class="stat"><b id="s-wave">0</b><span class="lbl">已清</span></div>
    <div class="stat"><b id="s-score">0</b><span class="lbl">积分</span></div>
    <button class="ctrl" id="b-gems">宝石</button>
    <div class="spacer"></div>
    <button class="ctrl go" id="b-wave">出战 ▶</button>
    <div class="speedbtns"><button id="sp-pause">⏸</button><button id="sp-1" class="on">1×</button><button id="sp-2">2×</button></div>
  </div>
  <div id="stage"><div id="popup-backdrop"></div><div id="wrap">
    <canvas id="cv"></canvas>
    <div class="hint" id="hint"></div>
    <div id="popup"></div>
    <div id="gempanel"></div>
    <div class="overlay" id="ov-start">
      <h1>家园守卫战 2<span class="sub">矿 洞 防 线 · 复 刻 版</span></h1>
      <p>点路边塔位建造防御塔，**升级到 30 级可进阶换形态**。<br>
        怪物每 10 分钟聚集一波（最多 30 波），点 <b style="color:var(--ok)">出战</b> 放一波来袭。<br>
        升级需要 CD，升级期间该塔暂停攻击。每日 24 点获得 3 颗随机宝石。</p>
      <button class="big" id="b-begin">进 入 城 镇</button>
    </div>
    <div class="overlay hide" id="ov-over">
      <h1 id="over-title">城 镇 失 守</h1>
      <div class="sl">已清 <b id="over-wave">0</b> 波 · 积分 <b id="over-score">0</b></div>
      <p id="over-msg"></p>
      <button class="big" id="b-restart">重整防线</button>
    </div>
  </div></div>
</div>

let path=[],segLen=[],pathLen=0;
function buildPath(){ path=WP.map(p=>({x:p[0],y:p[1]})); segLen=[0]; pathLen=0;
  for(let i=1;i<path.length;i++){ pathLen+=Math.hypot(path[i].x-path[i-1].x,path[i].y-path[i-1].y); segLen.push(pathLen); } }
function posAlong(d){ if(d<=0)return{x:path[0].x,y:path[0].y}; if(d>=pathLen){const n=path.length-1;return{x:path[n].x,y:path[n].y};}
  let i=1; while(i<segLen.length&&segLen[i]<d)i++; const t=(d-segLen[i-1])/(segLen[i]-segLen[i-1]),p0=path[i-1],p1=path[i];
  return {x:p0.x+(p1.x-p0.x)*t,y:p0.y+(p1.y-p0.y)*t}; }
function nearestOnPath(px,py){ let best=null,bd=1e9; for(let d=0;d<=pathLen;d+=12){const p=posAlong(d);const dd=Math.hypot(p.x-px,p.y-py); if(dd<bd){bd=dd;best={x:p.x,y:p.y};}} return best; }

  bx.save(); bx.fillStyle='#3a2a22'; bx.beginPath(); bx.ellipse(path[0].x+18,path[0].y,20,26,0,0,7); bx.fill(); bx.fillStyle='#1a120e'; bx.beginPath(); bx.ellipse(path[0].x+18,path[0].y,12,18,0,0,7); bx.fill(); bx.restore(); }
function road(c,w,col){ c.strokeStyle=col; c.lineWidth=w; c.lineCap='round'; c.lineJoin='round'; c.beginPath(); c.moveTo(path[0].x,path[0].y); for(let i=1;i<path.length;i++)c.lineTo(path[i].x,path[i].y); c.stroke(); }
function drawTree(c,x,y){ c.save(); c.fillStyle='rgba(0,0,0,.18)'; c.beginPath(); c.ellipse(x,y+18,18,7,0,0,7); c.fill(); c.fillStyle='#5a3f28'; c.fillRect(x-4,y,8,18); c.fillStyle='#3f7a36'; c.beginPath(); c.arc(x,y-6,17,0,7); c.fill(); c.fillStyle='#4d9043'; c.beginPath(); c.arc(x-7,y-2,11,0,7); c.arc(x+8,y-3,12,0,7); c.fill(); c.restore(); }
function drawHouse(c,x,y){ c.save(); c.fillStyle='#caa46e'; c.fillRect(x-22,y-6,44,30); c.fillStyle='#a85a44'; c.beginPath(); c.moveTo(x-28,y-4); c.lineTo(x,y-30); c.lineTo(x+28,y-4); c.closePath(); c.fill(); c.fillStyle='#5a3f28'; c.fillRect(x-6,y+6,12,18); c.restore(); }
function drawBase(c,x,y){ c.save(); c.fillStyle='rgba(0,0,0,.22)'; c.beginPath(); c.ellipse(x,y+30,44,14,0,0,7); c.fill(); c.fillStyle='#cfc6b4'; c.fillRect(x-34,y-6,68,40); c.fillStyle='#b84e3e'; c.beginPath(); c.moveTo(x-40,y-4); c.lineTo(x,y-44); c.lineTo(x+40,y-4); c.closePath(); c.fill(); c.strokeStyle='#e8c14a'; c.lineWidth=3; c.beginPath(); c.moveTo(x,y-58); c.lineTo(x,y-44); c.moveTo(x-6,y-52); c.lineTo(x+6,y-52); c.stroke(); c.fillStyle='#6a4a30'; c.fillRect(x-9,y+12,18,22); c.restore(); }

/* ================= 状态 ================= */
let G=null, plots=[], speed=1, paused=false, started=false, popupFor=null, lastT=0, hintTimer=0;
const now=()=>Date.now();
function scaledMs(startReal){ return (now()-startReal)*CFG.timeScale; }   // 折算后已过的"游戏毫秒"

function freshState(){ return { gold:CFG.startGold, hp:CFG.baseHP, wave:0, score:0,
  waveBank:0, lastWaveTick:now(), gems:{red:0,green:0,blue:0,grey:0,yellow:0}, lastGemTs:now(),
  plots:PLOTS_DEF.map(()=>null) }; }

function newGame(reset){ buildPath(); renderBG();
  let save = reset?null:loadSave();
  const meta = save || freshState();
  plots = PLOTS_DEF.map(([x,y],i)=>({x,y,tower: meta.plots[i]? reviveTower(meta.plots[i],x,y):null }));
  G={ gold:meta.gold, hp:meta.hp, wave:meta.wave, score:meta.score,
      waveBank:meta.waveBank, lastWaveTick:meta.lastWaveTick, gems:meta.gems, lastGemTs:meta.lastGemTs,
      enemies:[], soldiers:[], projs:[], parts:[], floaters:[],
      waveActive:false, queue:[], spawnT:0, gemAcc:0, gameOver:false };
  resolveOffline();
  popupFor=null; closePopup(); refreshHUD(); }

function reviveTower(s,x,y){ const t={key:s.key, formKey:s.formKey, tier:s.tier, level:s.level,
    state:s.state, startReal:s.startReal, durNominal:s.durNominal, invested:s.invested||0,
    x,y, cd:0, rot:-Math.PI/2 };
  if(t.key==='barracks'){ const rp=nearestOnPath(x,y); t.rallyX=rp.x; t.rallyY=rp.y; t.spawnT=0; }
  return t; }

/* 离线结算：补算 升级/进阶完成、囤波、每日宝石 */
function resolveOffline(){
  for(const p of plots){ const t=p.tower; if(!t)continue;
    if(t.state==='upgrading' && scaledMs(t.startReal)>=t.durNominal){ t.state='idle'; t.level=Math.min(LV_MAX,t.level+1); }
    if(t.state==='evolving' && scaledMs(t.startReal)>=t.durNominal){ finishEvolve(t); } }
  accrueWaves(); grantGemsDue(); }

function accrueWaves(){ const iv=CFG.waveIntervalMs;
  if(G.waveBank>=CFG.waveCap){ G.lastWaveTick=now(); return; }
  while(scaledMs(G.lastWaveTick)>=iv && G.waveBank<CFG.waveCap){ G.waveBank++; G.lastWaveTick += iv/CFG.timeScale; }
  if(G.waveBank>=CFG.waveCap) G.lastWaveTick=now(); }

function grantGemsDue(){ // 每天本地 24 点发 3 颗随机宝石
  const colors=['red','green','blue','grey','yellow']; let guard=0;
  let next=midnightAfter(G.lastGemTs);
  while(now()>=next && guard++<3650){ for(let i=0;i<CFG.gemPerDayCount;i++){ G.gems[colors[Math.floor(Math.random()*5)]]++; }
    G.lastGemTs=next; next=midnightAfter(next); } }
function midnightAfter(ts){ const d=new Date(ts); d.setHours(24,0,0,0); return d.getTime(); }

/* 存档 */
function saveGame(){ try{ const data={ gold:G.gold, hp:G.hp, wave:G.wave, score:G.score,
    waveBank:G.waveBank, lastWaveTick:G.lastWaveTick, gems:G.gems, lastGemTs:G.lastGemTs,
    plots:plots.map(p=>p.tower? {key:p.tower.key,formKey:p.tower.formKey,tier:p.tower.tier,level:p.tower.level,
      state:p.tower.state,startReal:p.tower.startReal,durNominal:p.tower.durNominal,invested:p.tower.invested}:null) };
    localStorage.setItem(CFG.saveKey, JSON.stringify(data)); }catch(e){} }
function loadSave(){ try{ const s=localStorage.getItem(CFG.saveKey); return s?JSON.parse(s):null; }catch(e){ return null; } }

/* ================= 波次 ================= */
function makeWave(n){ const q=[],boss=(n%CFG.bossEvery===0),count=6+Math.floor(n*1.7);
  for(let i=0;i<count;i++){ let t='grunt'; const r=Math.random(); if(n>=3&&r<0.26)t='runner'; else if(n>=4&&r>=0.26&&r<0.5)t='armored'; q.push(t); }
  if(boss)q.push('boss'); const hpS=1+n*0.15; return q.map((t,i)=>({t,hpS,delay:i*Math.max(0.4,0.9-n*0.018)})); }
function releaseWave(){ if(G.gameOver||G.waveActive)return; if(G.waveBank<=0){ showHint('暂无可出战波数，等待聚集'); return; }
  G.waveBank--; G.wave++; G.queue=makeWave(G.wave); G.spawnT=0; G.waveActive=true; accrueWaves();
  showHint(`第 ${G.wave} 波来袭`+(G.wave%CFG.bossEvery===0?'　⚠ 海盗王！':'')); refreshHUD(); saveGame(); }

/* ================= 生成/建造 ================= */
function spawnEnemy(t,hpS){ const d=ENEMIES[t]; G.enemies.push({type:t,x:path[0].x,y:path[0].y,dist:0,hp:d.hp*hpS,maxhp:d.hp*hpS,speed:d.speed,armor:d.armor,reward:d.reward,dmg:d.dmg,r:d.r,color:d.color,slowT:0,slowAmt:0,blocker:null,atkCd:0}); }
function buildTower(plot,key){ if(G.gold<BUILD_COST[key])return false; G.gold-=BUILD_COST[key];
  const t={key, formKey:key, tier:1, level:1, state:'idle', startReal:0, durNominal:0, invested:BUILD_COST[key], x:plot.x, y:plot.y, cd:0, rot:-Math.PI/2};
  if(key==='barracks'){ const rp=nearestOnPath(plot.x,plot.y); t.rallyX=rp.x; t.rallyY=rp.y; t.spawnT=0; }
  plot.tower=t; refreshHUD(); saveGame(); return true; }

function startUpgrade(t){ if(t.state!=='idle'||t.level>=LV_MAX)return false; const c=upgradeCost(t); if(G.gold<c)return false;
  G.gold-=c; t.invested+=c; t.state='upgrading'; t.startReal=now(); t.durNominal=upgradeCD(t); refreshHUD(); saveGame(); return true; }
function startEvolve(t,formKey){ if(t.state!=='idle'||t.level<LV_MAX||t.tier>=2)return false; const c=evolveCost(t); if(G.gold<c)return false;
  G.gold-=c; t.invested+=c; t._evoTo=formKey; t.state='evolving'; t.startReal=now(); t.durNominal=CFG.evolveMs; refreshHUD(); saveGame(); return true; }
function finishEvolve(t){ t.tier=2; t.formKey=t._evoTo||EVOLVE[t.key][0]; t.level=1; t.state='idle'; t._evoTo=null; }

/* ================= 主循环 ================= */
function loop(ts){ requestAnimationFrame(loop); if(!lastT)lastT=ts; let dt=(ts-lastT)/1000; lastT=ts; dt=Math.min(dt,0.05);
  if(started&&!G.gameOver){ metaTick(); if(!paused){ for(let s=0;s<speed;s++) update(dt); } }
  draw(); if(hintTimer>0){ hintTimer-=dt; if(hintTimer<=0)document.getElementById('hint').style.opacity='0'; } }

let metaAcc=0, saveAcc=0;
function metaTick(){ // 真实时间驱动：升级/进阶完成、囤波、每日宝石
  let changed=false;
  for(const p of plots){ const t=p.tower; if(!t)continue;
    if(t.state==='upgrading'&&scaledMs(t.startReal)>=t.durNominal){ t.state='idle'; t.level=Math.min(LV_MAX,t.level+1); changed=true; if(popupFor===p)openPopup(p); }
    else if(t.state==='evolving'&&scaledMs(t.startReal)>=t.durNominal){ finishEvolve(t); changed=true; showHint('进阶完成！'); if(popupFor===p)openPopup(p); } }
  const beforeBank=G.waveBank; accrueWaves(); grantGemsDue();
  if(changed||G.waveBank!==beforeBank){ refreshHUD(); }
  saveAcc++; if(saveAcc>180){ saveAcc=0; saveGame(); } // 约每 3 秒存一次
}

function update(dt){
  // 战斗中挖矿产金币
  if(G.waveActive){ G.gemAcc += GEMS_MAP.length*CFG.miningPerSec*dt;
    if(G.gemAcc>=1){ const g=Math.floor(G.gemAcc); G.gold+=g; G.gemAcc-=g; refreshHUD();
      if(Math.random()<0.25){ const [gx,gy]=GEMS_MAP[Math.floor(Math.random()*GEMS_MAP.length)]; floater(gx,gy-14,'+1','#f5c542'); } } }
  if(G.waveActive&&G.queue.length){ G.spawnT+=dt; while(G.queue.length&&G.spawnT>=G.queue[0].delay){ const e=G.queue.shift(); spawnEnemy(e.t,e.hpS); } }
  for(const e of G.enemies){ if(e.slowT>0){ e.slowT-=dt; if(e.slowT<=0)e.slowAmt=0; }
    const blocked=e.blocker&&!e.blocker.dead&&Math.hypot(e.blocker.x-e.x,e.blocker.y-e.y)<SOLDIER.meleeRange+4;
    if(blocked){ e.atkCd-=dt; if(e.atkCd<=0){ e.atkCd=0.9; e.blocker.hp-=e.dmg; spawnParts(e.blocker.x,e.blocker.y,'#e8574a',3); if(e.blocker.hp<=0)killSoldier(e.blocker); } }
    else { if(e.blocker&&e.blocker.dead)e.blocker=null; const sp=e.speed*(e.slowT>0?(1-e.slowAmt):1); e.dist+=sp*dt; const p=posAlong(e.dist); e.x=p.x; e.y=p.y;
      if(e.dist>=pathLen){ e.reached=true; G.hp-=e.type==='boss'?5:1; spawnParts(e.x,e.y,'#e8574a',8); if(G.hp<=0){G.hp=0; endGame(false);} refreshHUD(); } } }
  G.enemies=G.enemies.filter(e=>!e.reached&&e.hp>0);
  // 炮塔（升级/进阶中不攻击）
  for(const plot of plots){ const t=plot.tower; if(!t)continue; if(t.state!=='idle')continue;
    const st=lvStats(t);
    if(t.key==='barracks'){ updateBarracks(t,st,dt); continue; }
    t.cd-=dt; let best=null,bd=-1; const rng=st.range;
    for(const e of G.enemies){ const dd=Math.hypot(e.x-t.x,e.y-t.y); if(dd<=rng+e.r&&e.dist>bd){best=e;bd=e.dist;} }
    if(best){ t.rot=Math.atan2(best.y-t.y,best.x-t.x); if(t.cd<=0){ t.cd=st.rate; fire(t,st,best); } } }
  // 民兵
  for(const s of G.soldiers){ if(s.dead)continue;
    if(!s.target||s.target.hp<=0||s.target.reached){ if(s.target&&s.target.blocker===s)s.target.blocker=null; s.target=null;
      let best=null,bd=SOLDIER.leash; for(const e of G.enemies){ if(e.blocker&&!e.blocker.dead)continue; const dd=Math.hypot(e.x-s.rallyX,e.y-s.rallyY); if(dd<bd){bd=dd;best=e;} }
      if(best){ s.target=best; best.blocker=s; } }
    const tx=s.target?s.target.x:s.rallyX, ty=s.target?s.target.y:s.rallyY, dx=tx-s.x,dy=ty-s.y,dd=Math.hypot(dx,dy);
    if(s.target&&dd<=SOLDIER.meleeRange){ s.atkCd-=dt; if(s.atkCd<=0){ s.atkCd=SOLDIER.atkRate; applyDmg(s.target,s.dmg,'phys'); } }
    else if(dd>2){ const sp=SOLDIER.speed*dt; s.x+=dx/dd*sp; s.y+=dy/dd*sp; } }
  G.soldiers=G.soldiers.filter(s=>!s.removed);
  // 子弹
  for(const p of G.projs){ if(p.target&&p.target.hp>0&&!p.target.reached){p.tx=p.target.x;p.ty=p.target.y;}
    const dx=p.tx-p.x,dy=p.ty-p.y,dd=Math.hypot(dx,dy),step=p.speed*dt;
    if(dd<=step+4){ impact(p); p.dead=true; } else { p.x+=dx/dd*step; p.y+=dy/dd*step; p.a=Math.atan2(dy,dx); } }
  G.projs=G.projs.filter(p=>!p.dead);
  for(const pt of G.parts){ pt.life-=dt; pt.x+=pt.vx*dt; pt.y+=pt.vy*dt; pt.vy+=pt.g*dt; } G.parts=G.parts.filter(p=>p.life>0);
  for(const f of G.floaters){ f.life-=dt; f.y-=22*dt; } G.floaters=G.floaters.filter(f=>f.life>0);
  // 清波
  if(G.waveActive&&G.queue.length===0&&G.enemies.length===0){ G.waveActive=false;
    const b=16+Math.floor(G.wave*1.5); G.gold+=b; G.score+=G.wave*10; showHint(`第 ${G.wave} 波清除　+${b} 金币`); refreshHUD(); saveGame(); }
}
function updateBarracks(t,st,dt){ const alive=G.soldiers.filter(s=>s.barracks===t&&!s.dead).length; if(st.soldiers-alive>0){ t.spawnT-=dt; if(t.spawnT<=0){ t.spawnT=1.2; spawnSoldier(t,st); } } }
function spawnSoldier(t,st){ const a=Math.random()*7,off=14; G.soldiers.push({barracks:t,x:t.rallyX+Math.cos(a)*off,y:t.rallyY+Math.sin(a)*off,rallyX:t.rallyX+Math.cos(a)*10,rallyY:t.rallyY+Math.sin(a)*10,hp:st.sHp,maxhp:st.sHp,dmg:st.sDmg,atkCd:0,target:null,dead:false,removed:false}); }
function killSoldier(s){ s.dead=true; s.removed=true; if(s.target&&s.target.blocker===s)s.target.blocker=null; spawnParts(s.x,s.y,'#ccc',6); }
function fire(t,st,target){ const sp=t.key==='cannon'?340:st.proj==='magic'?460:600;
  G.projs.push({key:st.proj,x:t.x,y:t.y-10,tx:target.x,ty:target.y,a:t.rot,speed:sp,dmg:st.dmg,splash:st.splash,type:st.type,goldBonus:st.goldBonus,target,color:FORMS[t.formKey].type==='magic'?'#b388ff':'#e8c14a',dead:false});
  spawnParts(t.x+Math.cos(t.rot)*12,t.y-10+Math.sin(t.rot)*12,'#ffe',2); }
function applyDmg(e,dmg,type){ let d=dmg; if(type==='phys')d*=(1-e.armor); e.hp-=d; floater(e.x,e.y-e.r-4,'-'+Math.round(d),type==='magic'?'#c9a8ff':'#fff'); if(e.hp<=0)killEnemy(e); }
function impact(p){ if(p.splash>0){ spawnParts(p.tx,p.ty,'#ffd36b',14); explode(p.tx,p.ty,p.splash); for(const e of G.enemies){ if(Math.hypot(e.x-p.tx,e.y-p.ty)<=p.splash){ applyDmg(e,p.dmg,p.type); if(p.goldBonus&&e.hp<=0){G.gold+=p.goldBonus;} } } }
  else { if(p.target&&p.target.hp>0){ applyDmg(p.target,p.dmg,p.type); if(p.goldBonus&&p.target.hp<=0)G.gold+=p.goldBonus; } spawnParts(p.tx,p.ty,p.color,4); } }
function killEnemy(e){ if(e._dead)return; e._dead=true; e.hp=0; if(e.blocker&&e.blocker.target===e)e.blocker.target=null; G.gold+=e.reward; G.score+=5+e.reward; floater(e.x,e.y-e.r,'+'+e.reward,'#f5c542'); spawnParts(e.x,e.y,'#f5c542',e.type==='boss'?22:7,true); refreshHUD(); }
function spawnParts(x,y,c,n,rise){ for(let i=0;i<n;i++){ const a=Math.random()*7,sp=20+Math.random()*60; G.parts.push({x,y,vx:Math.cos(a)*sp,vy:rise?-30-Math.random()*40:Math.sin(a)*sp,g:rise?40:120,life:.4+Math.random()*.4,color:c,r:rise?2.5:1.5+Math.random()*2}); } }
function explode(x,y,R){ G.parts.push({x,y,vx:0,vy:0,g:0,life:.28,color:'#ffd36b',r:R,ring:true}); }
function floater(x,y,txt,c){ G.floaters.push({x,y,txt,color:c,life:.7}); }

/* ================= 渲染 ================= */
function draw(){ ctx.drawImage(bg,0,0); drawPlots(); drawRange();
  for(const [x,y] of GEMS_MAP){ const pl=.5+.5*Math.sin(Date.now()/350); ctx.save(); ctx.globalAlpha=.3+.3*pl; ctx.fillStyle='#f5c542'; ctx.beginPath(); ctx.arc(x,y,16,0,7); ctx.fill(); ctx.restore(); drawGem(x,y,11); }
  drawEnemies(); drawSoldiers(); drawTowers(); drawProjs(); drawParts(); drawFloaters(); }
function drawPlots(){ for(const p of plots){ if(p.tower)continue; ctx.save();
  ctx.fillStyle='rgba(150,120,80,.4)'; ctx.beginPath(); ctx.ellipse(p.x,p.y+4,19,11,0,0,7); ctx.fill();
  ctx.strokeStyle='rgba(90,70,45,.7)'; ctx.lineWidth=2.5; ctx.beginPath(); ctx.ellipse(p.x,p.y+4,15,9,0,0,7); ctx.stroke();
  ctx.strokeStyle='#8a6a44'; ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x,p.y-22); ctx.stroke();
  ctx.fillStyle='#ece6d8'; ctx.fillRect(p.x-11,p.y-32,22,13); ctx.fillStyle='#7a6a4a'; ctx.font='bold 11px sans-serif'; ctx.textAlign='center'; ctx.fillText('T',p.x,p.y-22); ctx.restore(); } ctx.textAlign='left'; }
function drawRange(){ const t=popupFor&&popupFor.tower; if(t&&t.key!=='barracks'){ const st=lvStats(t); ctx.save(); ctx.fillStyle='rgba(120,200,255,.10)'; ctx.strokeStyle='rgba(120,200,255,.5)'; ctx.beginPath(); ctx.arc(t.x,t.y,st.range,0,7); ctx.fill(); ctx.stroke(); ctx.restore(); }
  if(t&&t.key==='barracks'){ ctx.save(); ctx.fillStyle='rgba(120,200,255,.5)'; ctx.beginPath(); ctx.arc(t.rallyX,t.rallyY,6,0,7); ctx.fill(); ctx.restore(); } }
function drawEnemies(){ for(const e of G.enemies){ ctx.save(); ctx.translate(e.x,e.y); if(e.slowT>0){ctx.shadowColor='#7be0d6';ctx.shadowBlur=8;}
  ctx.fillStyle=e.color; ctx.beginPath(); ctx.arc(0,0,e.r,0,7); ctx.fill(); ctx.shadowBlur=0;
  ctx.fillStyle='rgba(0,0,0,.25)'; ctx.beginPath(); ctx.arc(0,0,e.r,.2,Math.PI-.2); ctx.fill();
  if(e.armor>0.3){ ctx.strokeStyle='#b8c4d4'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(0,0,e.r-1,0,7); ctx.stroke(); }
  ctx.fillStyle='#1c2530'; ctx.beginPath(); ctx.arc(e.r*.35,-e.r*.25,e.r*.2,0,7); ctx.fill();
  if(e.type==='boss'){ ctx.strokeStyle='#ffd86b'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(0,0,e.r+3,0,7); ctx.stroke(); } ctx.restore();
  const w=e.r*2,h=4,f=Math.max(0,e.hp/e.maxhp),X=e.x-w/2,Y=e.y-e.r-9; ctx.fillStyle='rgba(0,0,0,.55)'; ctx.fillRect(X-1,Y-1,w+2,h+2); ctx.fillStyle=f>.5?'#5fcf80':f>.25?'#e8c14a':'#e8574a'; ctx.fillRect(X,Y,w*f,h); } }
function drawSoldiers(){ for(const s of G.soldiers){ if(s.dead)continue; ctx.save(); ctx.translate(s.x,s.y);
  ctx.fillStyle='rgba(0,0,0,.25)'; ctx.beginPath(); ctx.ellipse(0,7,7,3,0,0,7); ctx.fill(); ctx.fillStyle='#3a5a8a'; ctx.beginPath(); ctx.arc(0,0,7,0,7); ctx.fill();
  ctx.fillStyle='#d8b48a'; ctx.beginPath(); ctx.arc(0,-6,4,0,7); ctx.fill(); ctx.strokeStyle='#cfd8e4'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(6,-2); ctx.lineTo(11,-6); ctx.stroke(); ctx.restore();
  const w=14,f=Math.max(0,s.hp/s.maxhp); ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(s.x-w/2-1,s.y-13,w+2,3.5); ctx.fillStyle='#6aa0d8'; ctx.fillRect(s.x-w/2,s.y-12.5,w*f,2.5); } }
function drawTowers(){ for(const plot of plots){ const t=plot.tower; if(!t)continue; const img=IMG[t.formKey]; const S=58;
  if(t.key==='barracks'&&t.state==='idle'){ ctx.save(); ctx.strokeStyle='#c9d4e0'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(t.rallyX,t.rallyY); ctx.lineTo(t.rallyX,t.rallyY-14); ctx.stroke(); ctx.fillStyle='#6aa0d8'; ctx.beginPath(); ctx.moveTo(t.rallyX,t.rallyY-14); ctx.lineTo(t.rallyX+10,t.rallyY-11); ctx.lineTo(t.rallyX,t.rallyY-8); ctx.closePath(); ctx.fill(); ctx.restore(); }
  if(img&&img.complete&&img.naturalWidth){ const w=S,h=S*img.naturalHeight/img.naturalWidth; ctx.save(); if(t.state!=='idle')ctx.globalAlpha=.55; ctx.drawImage(img,t.x-w/2,t.y-h+14,w,h); ctx.restore(); }
  else { ctx.fillStyle='#888'; ctx.beginPath(); ctx.arc(t.x,t.y,16,0,7); ctx.fill(); }
  // 等级
  ctx.save(); ctx.font='bold 10px sans-serif'; ctx.textAlign='center'; ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillRect(t.x-13,t.y+12,26,12);
  ctx.fillStyle=t.tier===2?'#b388ff':'#f5c542'; ctx.fillText((t.tier===2?'★':'')+'Lv'+t.level,t.x,t.y+21); ctx.restore();
  // 升级/进阶进度
  if(t.state!=='idle'){ const pr=Math.min(1,scaledMs(t.startReal)/t.durNominal); ctx.save();
    ctx.strokeStyle='rgba(0,0,0,.5)'; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(t.x,t.y-6,22,0,7); ctx.stroke();
    ctx.strokeStyle=t.state==='evolving'?'#b388ff':'#f5c542'; ctx.beginPath(); ctx.arc(t.x,t.y-6,22,-Math.PI/2,-Math.PI/2+pr*7); ctx.stroke();
    ctx.fillStyle='#fff'; ctx.font='9px sans-serif'; ctx.textAlign='center'; ctx.fillText(t.state==='evolving'?'进阶中':'升级中',t.x,t.y-30); ctx.restore(); } } }
function drawProjs(){ for(const p of G.projs){ ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.a||0);
  if(p.key==='arrow'){ ctx.fillStyle='#5a4632'; ctx.fillRect(-7,-1.3,14,2.6); ctx.fillStyle='#eee'; ctx.fillRect(5,-1.5,3,3); }
  else if(p.key==='magic'){ ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(0,0,5,0,7); ctx.fill(); ctx.fillStyle='#fff'; ctx.globalAlpha=.8; ctx.beginPath(); ctx.arc(0,0,2.5,0,7); ctx.fill(); }
  else { ctx.fillStyle='#2a2018'; ctx.beginPath(); ctx.arc(0,0,5,0,7); ctx.fill(); } ctx.restore(); } }
function drawParts(){ for(const pt of G.parts){ ctx.globalAlpha=Math.max(0,Math.min(1,pt.life*2.5)); if(pt.ring){ ctx.strokeStyle=pt.color; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.r*(1.2-pt.life*1.5),0,7); ctx.stroke(); } else { ctx.fillStyle=pt.color; ctx.beginPath(); ctx.arc(pt.x,pt.y,pt.r,0,7); ctx.fill(); } } ctx.globalAlpha=1; }
function drawFloaters(){ ctx.save(); ctx.textAlign='center'; ctx.font='bold 12px sans-serif'; for(const f of G.floaters){ ctx.globalAlpha=Math.max(0,Math.min(1,f.life*1.6)); ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillText(f.txt,f.x+1,f.y+1); ctx.fillStyle=f.color; ctx.fillText(f.txt,f.x,f.y); } ctx.restore(); ctx.globalAlpha=1; ctx.textAlign='left'; }
function drawGem(x,y,r){ ctx.save(); ctx.translate(x,y); ctx.fillStyle='#f5c542'; ctx.beginPath(); ctx.moveTo(0,-r); ctx.lineTo(r*.8,-r*.3); ctx.lineTo(r*.5,r); ctx.lineTo(-r*.5,r); ctx.lineTo(-r*.8,-r*.3); ctx.closePath(); ctx.fill(); ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(0,-r); ctx.lineTo(0,r); ctx.moveTo(-r*.8,-r*.3); ctx.lineTo(r*.8,-r*.3); ctx.stroke(); ctx.restore(); }

/* ================= HUD / 交互 ================= */
function fmtDur(ms){ ms=Math.max(0,ms); const s=Math.floor(ms/1000); if(s<60)return s+'秒'; const m=Math.floor(s/60); if(m<60)return m+'分'+(s%60)+'秒'; const h=Math.floor(m/60); if(h<24)return h+'时'+(m%60)+'分'; return Math.floor(h/24)+'天'+(h%24)+'时'; }
function refreshHUD(){ document.getElementById('s-gold').textContent=Math.floor(G.gold);
  document.getElementById('s-hp').textContent=G.hp; document.getElementById('s-bank').textContent=G.waveBank;
  document.getElementById('s-wave').textContent=G.wave; document.getElementById('s-score').textContent=G.score;
  const lbl=document.getElementById('bank-lbl'); if(G.waveBank<CFG.waveCap){ lbl.textContent='/30 · '+fmtDur((CFG.waveIntervalMs-scaledMs(G.lastWaveTick))/CFG.timeScale*CFG.timeScale)+'后'; } else lbl.textContent='/30 满';
  const wb=document.getElementById('b-wave'); wb.disabled=G.waveActive||G.waveBank<=0; }
function isMobile(){ return matchMedia('(pointer:coarse)').matches||innerWidth<=768; }
function cvPos(ev){ const r=cv.getBoundingClientRect(),sx=cv.width/r.width,sy=cv.height/r.height;
  const t=ev.changedTouches?.[0]||ev.touches?.[0]; const cx=(t?t.clientX:ev.clientX)-r.left,cy=(t?t.clientY:ev.clientY)-r.top;
  return {px:cx*sx,py:cy*sy}; }
function onClick(ev){ if(ev.pointerType==='mouse'&&ev.button!==0)return; if(!started||G.gameOver)return;
  if(isMobile()&&document.getElementById('popup-backdrop').classList.contains('show'))return;
  const {px,py}=cvPos(ev);
  let hit=null,hd=28; for(const p of plots){ const dd=Math.hypot(p.x-px,p.y-py); if(dd<hd){hd=dd;hit=p;} }
  if(hit){ popupFor=hit; openPopup(hit); } else { popupFor=null; closePopup(); } }

function openPopup(plot){ const pop=document.getElementById('popup'); popupFor=plot;
  if(!plot.tower){ let html='<div class="ring">'; for(const k of BASE_KEYS){ const cant=G.gold<BUILD_COST[k]?'cant':''; html+=`<div class="tbtn ${cant}" data-k="${k}"><div class="ic"><img src="${SPRITES[k]}"></div><div class="nm">${FORMS[k].name}</div><div class="pr">◆${BUILD_COST[k]}</div></div>`; } html+='</div>'; pop.innerHTML=html;
    pop.querySelectorAll('.tbtn').forEach(b=>b.onclick=(e)=>{ e.stopPropagation(); if(buildTower(plot,b.dataset.k)){ openPopup(plot); showHint('建造 '+FORMS[b.dataset.k].name);} else showHint('金币不足'); }); }
  else { const t=plot.tower, f=form(t), st=lvStats(t);
    let body='';
    if(t.state==='upgrading'||t.state==='evolving'){ const pr=Math.min(1,scaledMs(t.startReal)/t.durNominal); const rem=(t.durNominal-scaledMs(t.startReal))/CFG.timeScale;
      body=`<div class="row"><span>${t.state==='evolving'?'进阶中':'升级中'}</span><b>${Math.floor(pr*100)}%</b></div><div class="bar"><i style="width:${pr*100}%"></i></div><div class="row"><span>剩余</span><b>${fmtDur(rem)}</b></div>`;
    } else {
      let stats = t.key==='barracks' ? `<div class="row"><span>民兵</span><b>${st.soldiers}名 · ${Math.round(st.sHp)}HP</b></div>`
        : `<div class="row"><span>伤害</span><b>${st.dmg.toFixed(0)}${st.type==='magic'?' 魔法':''}</b></div><div class="row"><span>射程</span><b>${st.range.toFixed(0)}</b></div><div class="row"><span>射速</span><b>${(1/st.rate).toFixed(1)}/秒</b></div>`;
      if(t.level<LV_MAX){ const c=upgradeCost(t),can=G.gold>=c; body=stats+`<div class="acts"><button class="up" ${can?'':'disabled'}>升级 ◆${c}<br><span style="font-size:9px;opacity:.8">CD ${fmtDur(upgradeCD(t)/CFG.timeScale)}</span></button><button class="sell">拆除 +${Math.floor(t.invested*.6)}</button></div>`;
      } else if(t.tier<2){ const opts=EVOLVE[t.key]; const c=evolveCost(t);
        if(opts.length===0){ body=stats+`<div class="row"><b style="color:var(--gold)">已满级（无进阶）</b></div><div class="acts"><button class="sell">拆除 +${Math.floor(t.invested*.6)}</button></div>`; }
        else { body=stats+`<div class="row"><b style="color:#b388ff">满 30 级 · 可进阶（${fmtDur(CFG.evolveMs/CFG.timeScale)}）◆${c}</b></div><div class="evopick">`+
          opts.map(o=>`<div class="opt" data-o="${o}"><img src="${SPRITES[o]}"><div class="nm">${FORMS[o].name}</div></div>`).join('')+`</div><div class="acts"><button class="sell">拆除 +${Math.floor(t.invested*.6)}</button></div>`; }
      } else { body=stats+`<div class="row"><b style="color:#b388ff">★2阶 已满级</b></div><div class="acts"><button class="sell">拆除 +${Math.floor(t.invested*.6)}</button></div>`; }
    }
    pop.innerHTML=`<div class="manage"><h4><span style="width:11px;height:11px;border-radius:3px;background:${t.tier===2?'#b388ff':'#88c'};display:inline-block"></span>${f.name} <span style="color:var(--muted);font-weight:400">${t.tier===2?'★':''}Lv.${t.level}</span></h4>${body}</div>`;
    const up=pop.querySelector('.up'); if(up)up.onclick=(e)=>{ e.stopPropagation(); if(startUpgrade(t)){ openPopup(plot); showHint('开始升级（暂停攻击）'); } else showHint('金币不足'); };
    pop.querySelectorAll('.opt').forEach(o=>o.onclick=(e)=>{ e.stopPropagation(); if(startEvolve(t,o.dataset.o)){ openPopup(plot); showHint('开始进阶 → '+FORMS[o.dataset.o].name); } else showHint('金币不足'); });
    const sell=pop.querySelector('.sell'); if(sell)sell.onclick=(e)=>{ e.stopPropagation();
      if(isMobile()&&!sell.dataset.confirm){ sell.textContent='确认拆除？'; sell.dataset.confirm='1'; return; }
      G.gold+=Math.floor(t.invested*.6); G.soldiers=G.soldiers.filter(s=>s.barracks!==t); plot.tower=null; popupFor=null; closePopup(); refreshHUD(); saveGame(); };
  }
  const wrapR=document.getElementById('wrap').getBoundingClientRect(),r=cv.getBoundingClientRect(),sx=r.width/cv.width,sy=r.height/cv.height;
  const bd=document.getElementById('popup-backdrop');
  pop.style.display='block';
  if(isMobile()){ pop.classList.add('mobile-center'); bd.classList.add('show'); pop.style.left='50%'; pop.style.top='50%'; }
  else { pop.classList.remove('mobile-center'); bd.classList.remove('show'); pop.style.left=((r.left-wrapR.left)+plot.x*sx)+'px'; pop.style.top=((r.top-wrapR.top)+plot.y*sy-50)+'px'; } }
function closePopup(){ const pop=document.getElementById('popup'); pop.style.display='none'; pop.classList.remove('mobile-center'); document.getElementById('popup-backdrop').classList.remove('show'); }
function showHint(m){ const h=document.getElementById('hint'); h.textContent=m; h.style.opacity='1'; hintTimer=2; }

function toggleGems(){ const gp=document.getElementById('gempanel'); if(gp.style.display==='block'){ gp.style.display='none'; return; }
  const cmap={red:['红宝石','#e0524a'],green:['绿宝石','#54c46a'],blue:['蓝宝石','#4a8fe0'],grey:['灰宝石','#9aa3ad'],yellow:['黄宝石','#e6c33a']};
  let html='<h4>宝石仓库</h4>'; for(const k in cmap){ html+=`<div class="grow"><span class="gname"><span class="sw" style="background:${cmap[k][1]}"></span>${cmap[k][0]}</span><b>×${G.gems[k]}</b></div>`; }
  html+='<div class="note">每日 24 点获得 3 颗随机 1 级宝石。宝石作用待实现。</div>'; gp.innerHTML=html; gp.style.display='block'; }

/* ===== 流程 ===== */
function beginGame(){ document.getElementById('ov-start').classList.add('hide'); document.getElementById('ov-over').classList.add('hide'); newGame(false); started=true; paused=false; showHint('点塔位建造防御塔，点出战放怪'); }
function endGame(){ G.gameOver=true; G.enemies=[]; G.soldiers=[]; G.projs=[]; G.waveActive=false;
  document.getElementById('over-title').textContent='城镇失守'; document.getElementById('over-wave').textContent=G.wave; document.getElementById('over-score').textContent=G.score;
  document.getElementById('over-msg').textContent='基地被攻破。重整防线后基地生命恢复，炮塔与进度保留。'; document.getElementById('ov-over').classList.remove('hide'); saveGame(); }
function restart(){ G.hp=CFG.baseHP; G.gameOver=false; document.getElementById('ov-over').classList.add('hide'); refreshHUD(); saveGame(); }

document.getElementById('b-begin').onclick=beginGame;
document.getElementById('b-restart').onclick=restart;
document.getElementById('b-wave').onclick=()=>releaseWave();
document.getElementById('b-gems').onclick=toggleGems;
function setSpeed(s){ if(s==='pause'){ paused=!paused; document.getElementById('sp-pause').classList.toggle('on',paused); return; } paused=false; speed=s; document.getElementById('sp-pause').classList.remove('on'); document.getElementById('sp-1').classList.toggle('on',s===1); document.getElementById('sp-2').classList.toggle('on',s===2); }
document.getElementById('sp-pause').onclick=()=>setSpeed('pause'); document.getElementById('sp-1').onclick=()=>setSpeed(1); document.getElementById('sp-2').onclick=()=>setSpeed(2);
cv.addEventListener('pointerup',onClick);
document.getElementById('popup-backdrop').addEventListener('pointerup',(ev)=>{ if(ev.target!==ev.currentTarget)return; popupFor=null; closePopup(); });
window.addEventListener('beforeunload',saveGame);
function fit(){ const stage=document.getElementById('stage'); const scale=Math.min((stage.clientWidth-24)/cv.width,(stage.clientHeight-24)/cv.height,1.3); cv.style.width=cv.width*scale+'px'; cv.style.height=cv.height*scale+'px'; if(popupFor&&document.getElementById('popup').style.display==='block')openPopup(popupFor); }
window.addEventListener('resize',fit);

newGame(false); fit(); requestAnimationFrame(loop);
</script>
